<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sudoku Variants</title>
    <link rel="stylesheet" href="./app.css">
  </head>
  <body>
    <div id="app" class="app-shell">
      <header class="topbar">
        <button id="menu-home" class="title-home" aria-label="Home" title="Home">
          <p class="eyebrow">Sudoku Variants</p>
          <h1>数独コレクション</h1>
        </button>
      </header>

      <main class="main-grid">
        <section id="screen-rule" class="screen-card">
          <div id="rule-list" class="rule-grid"></div>
        </section>

        <section id="screen-difficulty" class="screen-card is-hidden">
          <div class="section-actions">
            <button id="back-to-rule" class="icon-button icon-button--textless" aria-label="Back" title="Back"></button>
          </div>
          <div id="difficulty-list" class="difficulty-list"></div>
        </section>

        <section id="screen-example" class="screen-card is-hidden">
          <div class="section-head">
            <h2 id="example-title">Preview</h2>
          </div>
          <div class="example-layout">
            <div class="board-panel">
              <div id="example-board" class="board board--example"></div>
            </div>
            <div class="text-panel">
              <p id="example-rule-name" class="rule-chip"></p>
              <p id="example-description" class="long-copy"></p>
              <div class="section-actions">
                <button id="back-to-difficulty" class="icon-button icon-button--textless" aria-label="Back" title="Back"></button>
                <button id="start-puzzle" class="icon-button icon-button--textless" aria-label="Play" title="Play"></button>
              </div>
            </div>
          </div>
        </section>

        <section id="screen-game" class="screen-card is-hidden">
          <div class="game-main">
            <div class="game-head">
              <div class="game-head-actions">
                <button id="hint-button" class="icon-button" aria-label="Hint" title="Hint"></button>
                <button id="rule-button" class="icon-button" aria-label="Rule" title="Rule"></button>
              </div>
              <div class="game-head-center">
                <h2 id="game-title">Puzzle</h2>
                <p id="timer-line" class="timer-line">00:00</p>
              </div>
              <div class="game-head-actions">
                <button id="pause-button" class="icon-button" aria-label="Pause" title="Pause"></button>
                <button id="reset-button" class="icon-button" aria-label="Reset" title="Reset"></button>
                <button id="next-button" class="icon-button" aria-label="Next" title="Next"></button>
              </div>
            </div>
            <p id="status-line" class="status-line"></p>
            <div id="game-board" class="board board--play"></div>
            <div class="toolbar">
              <button id="note-toggle" class="icon-button" aria-label="Note" title="Note"></button>
              <button id="clear-notes" class="icon-button" aria-label="Clear notes" title="Clear notes"></button>
              <button id="erase-cell" class="icon-button" aria-label="Delete" title="Delete"></button>
            </div>
            <div id="keypad" class="keypad"></div>
          </div>
        </section>
      </main>
    </div>

    <dialog id="rule-dialog" class="rule-dialog">
      <div class="dialog-inner">
        <p id="dialog-rule-chip" class="rule-chip"></p>
        <h2 id="dialog-rule-title">Rule</h2>
        <p id="dialog-rule-copy" class="long-copy"></p>
      </div>
    </dialog>

    <dialog id="pause-dialog" class="rule-dialog">
      <div class="dialog-inner dialog-inner--pause">
        <h2>Paused</h2>
        <div class="dialog-actions">
          <button id="resume-button" class="icon-button icon-button--textless" aria-label="Resume" title="Resume"></button>
        </div>
      </div>
    </dialog>

    <dialog id="clear-dialog" class="clear-dialog">
      <div class="dialog-inner">
        <p class="section-kicker">Clear</p>
        <h2>クリアしました</h2>
        <p>次の問題に進むか、別のルールやメインメニューへ戻れます。</p>
        <div class="dialog-actions">
          <button id="clear-next" class="ghost-button" aria-label="Next puzzle" title="Next puzzle"></button>
          <button id="clear-rule" class="ghost-button" aria-label="Change rule" title="Change rule"></button>
          <button id="clear-home" class="ghost-button" aria-label="Main menu" title="Main menu"></button>
        </div>
      </div>
    </dialog>

    <script type="module" src="./app.js"></script>
  </body>
</html>
